<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách sản phẩm</h2>
        <a href="/cart" class="btn btn-warning">Giỏ hàng</a>
    </div>

    <div class="row">
        <div class="col-md-3 mb-4" th:each="product : ${products}">
            <div class="card h-100">
                <img th:src="${product.image}" class="card-img-top" style="height:200px; object-fit:cover;">
                <div class="card-body text-center">
                    <h5 th:text="${product.name}"></h5>
                    <p class="text-danger fw-bold" th:text="${product.price} + ' đ'"></p>
                    <p>Số lượng: <span th:text="${product.quantity}"></span></p>

                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Chi tiết</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
