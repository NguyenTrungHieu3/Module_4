<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Thanh toán</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4">
    <h3>Thanh toán</h3>

    <div th:if="${#lists.isEmpty(cart.items)}" class="alert alert-warning">
      Không có sản phẩm trong giỏ hàng.
    </div>

    <div th:if="${!#lists.isEmpty(cart.items)}">
      <p>Tổng tiền: <span class="text-danger fw-bold" th:text="${cart.totalMoney} + ' đ'"></span></p>

      <form th:action="@{/cart/checkout}" method="post">
        <button class="btn btn-primary">Xác nhận thanh toán</button>
      </form>
    </div>

    <br>
    <a href="/cart" class="btn btn-secondary">Quay lại giỏ hàng</a>
  </div>
</div>

</body>
</html>
