<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/layout :: head(${pageTitle}, ~{})}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('new-post')}"></nav>
<div th:replace="~{layout/layout :: flashMessage}"></div>

<main class="container mt-4">
  <h3 class="mb-3" th:text="${isEdit} ? 'Cập nhật bài viết' : 'Tạo bài viết mới'">Tạo bài viết mới</h3>

  <form th:action="${isEdit} ? @{/posts/{id}/update(id=${post.id})} : @{/posts}"
        th:object="${post}"
        method="post"
        class="card p-3">

    <div class="mb-3">
      <label for="title" class="form-label">Tiêu đề</label>
      <input id="title" type="text" th:field="*{title}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="category" class="form-label">Danh mục</label>
      <input id="category" type="text" th:field="*{category}" class="form-control">
    </div>

    <div class="mb-3">
      <label for="summary" class="form-label">Tóm tắt ngắn</label>
      <textarea id="summary" th:field="*{summary}" class="form-control" rows="2"></textarea>
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">Nội dung</label>
      <textarea id="content" th:field="*{content}" class="form-control" rows="8" required></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Lưu thay đổi' : 'Tạo mới'">Tạo mới</button>
      <a th:href="@{/posts}" class="btn btn-secondary">Quay lại</a>
    </div>
  </form>
</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
<div th:replace="~{layout/layout :: scripts(~{})}"></div>
</body>
</html>
