<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/layout :: head('Danh sách bài viết', ~{})}"></head>
<body>

<nav th:replace="~{layout/layout :: navbar('home')}"></nav>
<div th:replace="~{layout/layout :: flashMessage}"></div>

<main class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">📚 Danh sách bài viết</h3>
        <a th:href="@{/posts/new}" class="btn btn-primary">➕ Thêm bài viết</a>
    </div>

    <!-- 🔥 SEARCH + FILTER -->
    <form method="get" class="row g-2 mb-4">

        <!-- Search -->
        <div class="col-md-6">
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   placeholder="🔍 Tìm kiếm theo tiêu đề..."
                   class="form-control">
        </div>

        <!-- Category -->
        <div class="col-md-4">
            <select name="categoryId" class="form-select">
                <option value="">-- Tất cả danh mục --</option>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:selected="${c.id == categoryId}"
                        th:text="${c.name}">
                </option>
            </select>
        </div>

        <!-- Button -->
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary">Tìm</button>
        </div>

    </form>

    <!-- EMPTY -->
    <div class="alert alert-info" th:if="${posts.totalElements == 0}">
        Không có bài viết nào.
    </div>

    <!-- LIST POSTS -->
    <div class="card mb-3" th:each="post : ${posts.content}">
        <div class="card-body">

            <!-- TITLE -->
            <h5 class="card-title" th:text="${post.title}">Tiêu đề</h5>

            <!-- CATEGORY + DATE -->
            <div class="mb-2 text-muted small">
                <span th:if="${post.category != null}">
                    📂 <span th:text="${post.category.name}"></span>
                </span>
                |
                <span th:if="${post.createdAt != null}">
                    🕒 <span th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                </span>
            </div>

            <!-- SUMMARY -->
            <p class="card-text"
               th:text="${#strings.abbreviate(post.content, 150)}">
            </p>

            <!-- ACTIONS -->
            <div class="d-flex gap-2">
                <a th:href="@{/posts/{id}(id=${post.id})}"
                   class="btn btn-sm btn-outline-primary">👁 Xem</a>

                <a th:href="@{/posts/{id}/edit(id=${post.id})}"
                   class="btn btn-sm btn-outline-secondary">✏ Sửa</a>

                <form th:action="@{/posts/{id}/delete(id=${post.id})}"
                      method="post">
                    <button type="submit"
                            class="btn btn-sm btn-outline-danger"
                            onclick="return confirm('Bạn chắc chắn muốn xoá?')">
                        🗑 Xoá
                    </button>
                </form>
            </div>

        </div>
    </div>

    <!-- 🔥 PAGINATION -->
    <nav class="mt-4" th:if="${posts.totalPages > 1}">
        <ul class="pagination justify-content-center">

            <!-- PREV -->
            <li class="page-item"
                th:classappend="${posts.hasPrevious()} ? '' : 'disabled'">
                <a class="page-link"
                   th:href="@{/posts(page=${posts.number - 1}, keyword=${keyword}, categoryId=${categoryId})}">
                    ←
                </a>
            </li>

            <!-- PAGE NUMBERS -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, posts.totalPages - 1)}"
                th:classappend="${i == posts.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/posts(page=${i}, keyword=${keyword}, categoryId=${categoryId})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <!-- NEXT -->
            <li class="page-item"
                th:classappend="${posts.hasNext()} ? '' : 'disabled'">
                <a class="page-link"
                   th:href="@{/posts(page=${posts.number + 1}, keyword=${keyword}, categoryId=${categoryId})}">
                    →
                </a>
            </li>

        </ul>
    </nav>

</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
<div th:replace="~{layout/layout :: scripts(~{})}"></div>

</body>
</html>
