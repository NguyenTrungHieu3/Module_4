<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout/layout :: head('Chi tiết bài viết', ~{})}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('home')}"></nav>
<div th:replace="~{layout/layout :: flashMessage}"></div>

<main class="container mt-4">
  <div class="card">
    <div class="card-body">
      <h3 class="card-title" th:text="${post.title}">Tiêu đề</h3>
      <p class="text-muted mb-2" th:if="${post.category != null and !#strings.isEmpty(post.category)}">
        Danh mục: <span th:text="${post.category}">Chung</span>
      </p>
      <p class="text-muted" th:if="${post.createdAt != null}">
        Ngày tạo: <span th:text="${#temporals.format(post.createdAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 10:00</span>
      </p>
      <hr>
      <p style="white-space: pre-line;" th:text="${post.content}">Nội dung bài viết</p>

      <div class="d-flex gap-2 mt-3">
        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-outline-secondary">Sửa</a>
        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-danger" onclick="return confirm('Bạn muốn xoá bài viết này?')">Xoá</button>
        </form>
        <a th:href="@{/posts}" class="btn btn-primary">Về danh sách</a>
      </div>
    </div>
  </div>
</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
<div th:replace="~{layout/layout :: scripts(~{})}"></div>
</body>
</html>
