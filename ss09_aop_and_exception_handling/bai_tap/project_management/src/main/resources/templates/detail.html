<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Chi tiết sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card">
    <div class="row g-0">
      <div class="col-md-4">
        <img th:src="${product.image}" class="img-fluid rounded-start" style="height:100%; object-fit:cover;">
      </div>
      <div class="col-md-8">
        <div class="card-body">
          <h3 th:text="${product.name}"></h3>
          <p class="text-danger fs-4 fw-bold" th:text="${product.price} + ' đ'"></p>
          <p><b>Số lượng còn:</b> <span th:text="${product.quantity}"></span></p>
          <p><b>Mô tả:</b> <span th:text="${product.description}"></span></p>

          <div th:if="${product.quantity > 0}">
            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
              <button class="btn btn-primary">Mua ngay</button>
            </form>
          </div>

          <div th:if="${product.quantity == 0}">
            <p class="text-danger">Hết hàng</p>
          </div>

          <br>
          <a href="/products" class="btn btn-secondary">Quay lại</a>
          <a href="/cart" class="btn btn-warning">Giỏ hàng</a>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
