<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Kết quả</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="card text-center">
    <div class="card-body">

      <h3 class="mb-3" th:text="${message}"></h3>

      <div th:if="${code != null}">
        <p>Mã mượn của bạn:</p>
        <h4 class="text-primary" th:text="${code}"></h4>
      </div>

      <a href="/books" class="btn btn-primary mt-3">Về danh sách</a>

    </div>
  </div>

</div>

</body>
</html>
