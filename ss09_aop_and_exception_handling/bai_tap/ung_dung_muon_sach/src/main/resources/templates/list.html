<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Danh sách sách</h2>

    <table class="table table-bordered table-hover bg-white">
        <thead class="table-dark">
        <tr>
            <th>Tên sách</th>
            <th>Tác giả</th>
            <th>Số lượng</th>
            <th>Chi tiết</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td>
                <span th:if="${book.quantity > 0}" class="badge bg-success"
                      th:text="${book.quantity}"></span>
                <span th:if="${book.quantity == 0}" class="badge bg-danger">
                    Hết sách
                </span>
            </td>
            <td>
                <a th:href="@{/books/{id}(id=${book.id})}"
                   class="btn btn-primary btn-sm">
                    Xem
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Trả sách -->
    <div class="card mt-4">
        <div class="card-body">
            <h5>Trả sách</h5>

            <form action="/books/return" method="post" class="row g-3">
                <div class="col-md-8">
                    <input type="text" name="code" class="form-control" placeholder="Nhập mã mượn" required>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-success w-100">Trả sách</button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>
