<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Chi tiết sách</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="card">
    <div class="card-body">

      <h3 class="card-title mb-4">Chi tiết sách</h3>

      <p><b>Tên:</b> <span th:text="${book.title}"></span></p>
      <p><b>Tác giả:</b> <span th:text="${book.author}"></span></p>
      <p><b>Số lượng:</b> <span th:text="${book.quantity}"></span></p>

      <!-- Mượn sách -->
      <div th:if="${book.quantity > 0}">
        <form th:action="@{/books/borrow/{id}(id=${book.id})}" method="post">
          <button class="btn btn-primary">Mượn sách</button>
        </form>
      </div>

      <div th:if="${book.quantity == 0}">
        <p class="text-danger">Hết sách</p>
      </div>

      <br>
      <a href="/books" class="btn btn-secondary">Quay lại</a>

    </div>
  </div>

</div>

</body>
</html>
