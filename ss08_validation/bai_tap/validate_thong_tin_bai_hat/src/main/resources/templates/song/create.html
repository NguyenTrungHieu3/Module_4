<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Song</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div style="padding: 15px; margin-top: 15px">
    <div style="width: 600px; margin: 0 auto;">
        <h3>Create a new user</h3>
        <hr/>
        <form th:action="@{/song/create}" method="post" th:object="${songDto}">
            <div class="mb-3">
                <label class="form-label">Song Name</label>
                <input type="text" class="form-control" th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                      class="invalid-feedback"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Artist</label>
                <input type="text" class="form-control" th:field="*{artist}"
                       th:classappend="${#fields.hasErrors('artist')} ? 'is-invalid' : ''">
                <span th:if="${#fields.hasErrors('artist')}" th:errors="*{artist}" class="invalid-feedback"></span>
            </div>
            <div class="mb-3">
                <label class="form-label">Genre</label>
                <input type="text" class="form-control" th:field="*{genre}"
                       th:classappend="${#fields.hasErrors('genre')} ? 'is-invalid' : ''">
                <span th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"
                      class="invalid-feedback"></span>
            </div>
            <div>
                <button class="btn btn-warning" type="submit">
                    Save
                </button>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
