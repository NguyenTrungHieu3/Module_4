<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{layout/layout::head('Product List', ~{})}"></head>
<body>
<th:block th:replace="~{layout/layout::navbar('product')}"/>
<h2>Product List</h2>
<form th:action="@{/product/search}">
    <input type="text" name="productName" placeholder="Search by name">
    <button type="submit">Search</button>
</form>
<a class="btn btn-sm btn-primary" th:href="@{/product/add}">Create Product</a>
<table class="table table-striped table-bordered table-dark">
    <tr>
        <th>STT</th>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Description</th>
        <th>Manufacturer</th>
        <th colspan="3">Action</th>
    </tr>
    <tr th:each="product, status: ${productList}">
        <td th:text="${status.count}"></td>
        <td th:text="${product.id}"></td>
        <td th:text="${product.name}"></td>
        <td th:text="${product.price}"></td>
        <td th:text="${product.description}"></td>
        <td th:text="${product.manufacturer}"></td>
        <td>
            <a class="btn btn-sm btn-primary" th:href="@{/product/detail(id=${product.id})}">Detail</a>
        </td>
        <td>
            <a class="btn btn-sm btn-warning" th:href="@{/product/update/__${product.id}__}">Update</a>
        </td>
        <td>
            <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal" th:attr="data-id=${product.id}, data-name=${product.name}" >Delete
            </button>
        </td>
    </tr>
</table>

<!-- Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <form th:action="@{/product/delete}" method="post">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Delete Confirm</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="deleteId" id="deleteId">
                    Bạn có muốn xóa sản phẩm <span id="deleteName" class="text-danger"> không?</span>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
    const deleteModal = document.getElementById("deleteModal");
    deleteModal.addEventListener("show.bs.modal", function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute("data-id");
        const name = button.getAttribute("data-name");

        document.getElementById("deleteId").value = id;
        document.getElementById("deleteName").innerText = name;
    })
</script>
<th:block th:replace="~{layout/layout::scripts(~{})}"/>
</body>
</html>
